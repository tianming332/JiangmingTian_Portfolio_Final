<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Local Admin | Portfolio</title>
    <meta name="description" content="Personal portfolio website">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="all,follow">
    <link rel="stylesheet" href="vendor/glightbox/css/glightbox.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,700&amp;display=swap">
    <link rel="stylesheet" href="css/style.default.css" id="theme-stylesheet">
    <link rel="stylesheet" href="css/custom.css">
    <link rel="shortcut icon" href="img/favicon.png">
  </head>
  <body>
    <div class="sidebar">
      <div class="sidebar-inner d-flex flex-column">
        <div class="px-4 py-5"><a href="index.html"><img src="img/favicon.png" alt="Logo" width="90"></a></div>
        <div class="sidebar-menu-holder flex-grow-1">
          <ul class="sidebar-menu list-unstyled">
            <li class="mb-2 pb-1"><a class="sidebar-link h6 text-uppercase letter-spacing-2 fw-bold text-sm active" href="index.html">Home</a></li>
            <li class="mb-2 pb-1"><a class="sidebar-link h6 text-uppercase letter-spacing-2 fw-bold text-sm" href="collections.html">Portfolio</a></li>
            <li class="mb-2 pb-1"><a class="sidebar-link h6 text-uppercase letter-spacing-2 fw-bold text-sm" href="video.html">Video Works</a></li>
            <li class="mb-2 pb-1"><a class="sidebar-link h6 text-uppercase letter-spacing-2 fw-bold text-sm" href="text.html">About</a></li>
          </ul>
        </div>
        <div class="px-4 py-3">
          <ul class="list-inline list-social mb-3">
            <li class="list-inline-item"><a class="reset-anchor" href="#!"><i class="fab fa-instagram"></i></a></li>
            <li class="list-inline-item"><a class="reset-anchor" href="#!"><i class="fab fa-linkedin"></i></a></li>
            <li class="list-inline-item"><a class="reset-anchor" href="#!"><i class="fas fa-envelope"></i></a></li>
          </ul>
        </div>
      </div>
    </div>
    <div class="page-holder">
      <div class="px-4 d-block d-lg-none">
        <header class="header">
          <nav class="navbar navbar-expand-lg navbar-light px-0">
            <button class="navbar-toggler navbar-toggler-end text-sm text-uppercase" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
              <svg class="svg-icon svg-icon-heavy svg-icon-sm text-dark"><use xlink:href="#menu-hamburger-1"></use></svg>
            </button><a class="navbar-brand" href="index.html"><img src="favicon.png" alt="Logo" width="50"></a>
          </nav>
        </header>
      </div>
      <div class="px-4 py-5 admin-panel">
        <div class="container-fluid">
          <div class="mb-5">
            <p class="section-kicker mb-2">Local Admin</p>
            <h1 class="h2 mb-3">Card Data Generator</h1>
            <p class="text-muted mb-0">这个页面只在本地帮你生成数据，不会自动写入 GitHub。生成后复制结果，替换对应 data 文件即可。</p>
          </div>
          <div class="row gy-5">
            <div class="col-lg-6">
              <h2 class="h4 mb-3">单个作品卡片</h2>
              <div class="mb-3"><label class="form-label">标题</label><input id="workTitle" class="form-control" value="New Work"></div>
              <div class="mb-3"><label class="form-label">关键词，用逗号分隔</label><input id="workKeywords" class="form-control" value="Visual, Interaction, 2025"></div>
              <div class="mb-3"><label class="form-label">简介</label><input id="workDescription" class="form-control" value="Short introduction for this work."></div>
              <div class="mb-3"><label class="form-label">封面路径</label><input id="workCover" class="form-control" value="uploads/works-covers/your-cover.jpg"></div>
              <div class="mb-3"><label class="form-label">Detail 页面链接</label><input id="workLink" class="form-control" value="works/your-project/index.html"></div>
              <button class="btn btn-primary rounded-pill" onclick="generateWork()">Generate works.js item</button>
              <textarea id="workOutput" class="form-control mt-3" readonly></textarea>
            </div>
            <div class="col-lg-6">
              <h2 class="h4 mb-3">年度作品集卡片</h2>
              <div class="mb-3"><label class="form-label">标题</label><input id="collectionTitle" class="form-control" value="2025 Portfolio"></div>
              <div class="mb-3"><label class="form-label">年份</label><input id="collectionYear" class="form-control" value="2025"></div>
              <div class="mb-3"><label class="form-label">简介</label><input id="collectionDescription" class="form-control" value="Annual portfolio collection."></div>
              <div class="mb-3"><label class="form-label">封面路径</label><input id="collectionCover" class="form-control" value="uploads/collection-covers/portfolio-2025-cover.jpg"></div>
              <div class="mb-3"><label class="form-label">外部链接</label><input id="collectionLink" class="form-control" value="https://yourname.github.io/portfolio-2025/"></div>
              <button class="btn btn-primary rounded-pill" onclick="generateCollection()">Generate collections.js item</button>
              <textarea id="collectionOutput" class="form-control mt-3" readonly></textarea>
            </div>
          </div>
        </div>
      </div>
      <footer class="text-muted" style="background: #0d0d0d">
        <div class="container-fluid py-4">
          <div class="row"><div class="col-lg-10 mx-auto">
            <p class="text-sm mb-0"><span class="text-muted">&copy; Jiangming Tian Portfolio. All rights reserved.</span></p>
          </div></div>
        </div>
      </footer>
    </div>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/masonry-layout/masonry.pkgd.min.js"></script>
    <script src="vendor/imagesloaded/imagesloaded.pkgd.min.js"></script>
    <script src="vendor/glightbox/js/glightbox.min.js"></script>
    <script>
      function q(id) { return document.getElementById(id).value.trim(); }
      function generateWork() {
        const item = { title: q("workTitle"), keywords: q("workKeywords").split(/[，,]/).map(v => v.trim()).filter(Boolean), description: q("workDescription"), cover: q("workCover"), link: q("workLink") };
        document.getElementById("workOutput").value = JSON.stringify(item, null, 2) + ",";
      }
      function generateCollection() {
        const item = { title: q("collectionTitle"), year: q("collectionYear"), description: q("collectionDescription"), cover: q("collectionCover"), link: q("collectionLink") };
        document.getElementById("collectionOutput").value = JSON.stringify(item, null, 2) + ",";
      }
    </script>
    <script src="js/front.js"></script>
    <script>
      function injectSvgSprite(path) {
        var ajax = new XMLHttpRequest();
        ajax.open("GET", path, true);
        ajax.send();
        ajax.onload = function() {
          var div = document.createElement("div");
          div.className = "d-none";
          div.innerHTML = ajax.responseText;
          document.body.insertBefore(div, document.body.childNodes[0]);
        };
      }
      injectSvgSprite("icons/orion-svg-sprite.svg");
    </script>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.1/css/all.css" integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous">
  </body>
</html>
